# Cut a release from CI, so nothing about a release depends on one person's
# workstation. This does everything `bun run release` used to do locally: bump
# every version, regenerate lockfiles, finalize changelogs, run checks, then
# commit, tag and push.
#
# Two triggers, one job:
#   - workflow_run on a completed main CI run: auto-release, but only off a GREEN
#     run. Releasing on raw push tagged shas whose tests then failed: v1.0.28
#     through v1.0.35 were each tagged before ci.yml had tested the sha, two red
#     packages/utils tests killed every publish downstream, and `releases/latest`
#     sat at v1.0.27 while the tags marched on. Gating on the CI conclusion means
#     a red main can never grow a release tag. The gate below then cuts a `patch`
#     release whenever a publishable package has an `## [Unreleased]` changelog
#     bullet waiting (see scripts/has-releasable-changes.ts). It is self-limiting:
#     release.ts empties the Unreleased section when it cuts the release, so the
#     bump commit it pushes is not itself releasable and never loops, and a
#     docs/chore-only merge with no bullet does not release.
#   - workflow_dispatch: manual release of an explicit version (major/minor/patch
#     or x.y.z), bypassing both the green-CI gate and the releasable gate.
#
# The push is where this workflow stops. `ci.yml` recognizes the release commit
# and tag and owns everything downstream: the platform binaries, the GitHub
# release (the only publish target), and the website deploys that refresh
# veyyon.dev/changelog and the get.veyyon.dev install + auto-update endpoint.
name: Release

on:
   workflow_run:
      workflows: [CI]
      types: [completed]
      branches: [main]
   workflow_dispatch:
      inputs:
         version:
            description: "Version to release: major, minor, patch, or an explicit x.y.z"
            required: true
            default: "patch"
            type: string

# Never run two releases at once, and never cancel one in flight: a half-pushed
# release (commit without tag, or a tag with no lockfile bump) is far worse than
# a queued one.
concurrency:
   group: release
   cancel-in-progress: false

permissions:
   contents: write

jobs:
   # Decide whether this event should cut a release, and which version. A manual
   # dispatch always releases the requested version. A push releases `patch` only
   # when there is something unreleased to ship. Kept as its own tiny job so the
   # expensive toolchain setup in `release` runs only when a release is happening.
   gate:
      name: Decide release
      runs-on: ubuntu-22.04
      # Only a GREEN CI run may auto-release. A failed/cancelled run ends here;
      # ci.yml's release_train_alert owns making that failure loud.
      if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
      outputs:
         should-release: ${{ steps.decide.outputs.should-release }}
         version: ${{ steps.decide.outputs.version }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              ref: main
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - id: decide
           env:
              EVENT_NAME: ${{ github.event_name }}
              DISPATCH_VERSION: ${{ inputs.version }}
              # Only defined for workflow_run events; empty on dispatch.
              HEAD_COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
              CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
           run: |
              set -euo pipefail
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                echo "manual dispatch: releasing '${DISPATCH_VERSION}'"
                echo "should-release=true" >> "$GITHUB_OUTPUT"
                echo "version=${DISPATCH_VERSION}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # The gate releases main HEAD, so the green CI run must BE main
              # HEAD. If main advanced past the run's sha, a newer CI run is
              # already in flight and its completion will re-enter this gate;
              # releasing here would ship commits CI has not finished testing.
              main_head=$(git rev-parse HEAD)
              if [ "$CI_HEAD_SHA" != "$main_head" ]; then
                echo "green CI run is for $CI_HEAD_SHA but main is at $main_head; deferring to the newer run's gate."
                echo "should-release=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              # Never release the release script's own bump commit
              # (it empties Unreleased, so the releasable check below would also
              # say no — this is the explicit, documented guard against a loop).
              subject="$(printf '%s' "$HEAD_COMMIT_MESSAGE" | head -n1)"
              case "$subject" in
                "chore: bump version to "*)
                  echo "head is the release bump commit; not releasing (no loop)."
                  echo "should-release=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
              esac
              # An explicit opt-out for a user-facing change you do not want to
              # ship yet.
              case "$HEAD_COMMIT_MESSAGE" in
                *"[skip release]"*)
                  echo "[skip release] marker present; not releasing."
                  echo "should-release=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
              esac
              releasable="$(bun scripts/has-releasable-changes.ts)"
              if [ "$releasable" = "true" ]; then
                echo "an Unreleased changelog bullet is waiting; cutting a patch release."
                echo "should-release=true" >> "$GITHUB_OUTPUT"
                echo "version=patch" >> "$GITHUB_OUTPUT"
              else
                echo "nothing unreleased; not releasing."
                echo "should-release=false" >> "$GITHUB_OUTPUT"
              fi

   release:
      name: Cut release
      needs: gate
      if: ${{ needs.gate.outputs.should-release == 'true' }}
      runs-on: ubuntu-22.04
      env:
         # secrets cannot be read in a step-level `if:`, so hoist presence here.
         HAS_RELEASE_PAT: ${{ secrets.RELEASE_PAT != '' }}
         RELEASE_VERSION: ${{ needs.gate.outputs.version }}
      steps:
         # Fail before touching anything if the push cannot trigger the release.
         # Reached only when the gate said a release should happen, so it fails
         # only when there was genuinely something to ship but no way to publish
         # it — never as noise on an ordinary main push.
         #
         # GitHub deliberately does not start workflow runs for pushes made with
         # the built-in GITHUB_TOKEN. This job's whole purpose is that its tagged
         # push starts the ci.yml release run, so with only GITHUB_TOKEN it would
         # bump versions, commit, tag and push, report success, and publish
         # nothing. That silent half-release is worse than refusing to start.
         - name: Require a push token that can trigger the release run
           if: ${{ env.HAS_RELEASE_PAT != 'true' }}
           run: |
              echo "::error::RELEASE_PAT is not set. A push made with the built-in GITHUB_TOKEN does not start a workflow run, so the release would be tagged but never published. Create a fine-grained PAT with Contents: read/write on this repo and store it as the RELEASE_PAT secret."
              exit 1

         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              ref: main
              # Full history plus tags: the preflight compares the requested
              # version against `git describe`, which a shallow clone cannot see.
              fetch-depth: 0
              fetch-tags: true
              # Persist the PAT as the credential `git push` uses, so the release
              # commit and tag arrive as a normal push and ci.yml picks them up.
              token: ${{ secrets.RELEASE_PAT }}

         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"

         # `release.ts` runs `bun run check`, whose `check:rs` half is
         # `cargo fmt --check` + `cargo clippy -D warnings`. Both need the
         # toolchain this repo pins in rust-toolchain.toml, with rustfmt and
         # clippy present: a plain stable/minimal install has neither component
         # and the release would fail in its own preflight. Same action and
         # same pin ci.yml uses.
         - uses: ./.github/actions/ensure-rust-toolchain
           with:
              toolchain: nightly-2026-04-29
              components: rustfmt,clippy


         # `release.ts` rewrites the Rust workspace version and the natives
         # version sentinel with `sd`.
         - name: Install sd
           run: cargo install sd --locked

         - name: Install dependencies
           run: bun install --frozen-lockfile

         # The release commit is authored by the workflow, not by whoever
         # clicked run: the commit subject is what ci.yml keys its never-cancel
         # release concurrency group off, and it must be reproducible.
         - name: Configure git identity
           run: |
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

         - name: Cut the release
           env:
              VEYYON_RELEASE_IN_CI: "1"
              # Read-only `gh` use (resolving the origin slug); the push itself
              # goes through the checkout credential above.
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: bun scripts/release.ts "$RELEASE_VERSION"

         - name: Summary
           run: |
              echo "### Released \`$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "The tagged push starts the CI release run, which publishes the" >> "$GITHUB_STEP_SUMMARY"
              echo "binaries, the GitHub release, and the website changelog." >> "$GITHUB_STEP_SUMMARY"

   # A red cut is as silent as a red publish was (v1.0.28-35): the preflight
   # check can fail, the atomic bump push can be rejected when main advances
   # mid-cut, or RELEASE_PAT can be missing — and none of that reaches ci.yml's
   # release_train_alert, which only watches the publish path. File/update the
   # same pinned `release-train` issue here; the next green PUBLISH closes it
   # (ci.yml side), so one issue tracks the whole train.
   cut_failed_alert:
      name: Alert on failed release cut
      needs: [gate, release]
      if: ${{ always() && (needs.gate.result == 'failure' || needs.release.result == 'failure') }}
      runs-on: ubuntu-22.04
      permissions:
         contents: read
         issues: write
      env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
         GATE_RESULT: ${{ needs.gate.result }}
         RELEASE_RESULT: ${{ needs.release.result }}
      steps:
         - name: File or update the pinned release-train issue
           shell: bash
           run: |
              set -euo pipefail
              title="Release train red: the release cut failed (gate=$GATE_RESULT, release=$RELEASE_RESULT)"
              body=$(printf 'The release CUT failed before any tag was published (gate=%s, release=%s).\n\nRun: %s\n\nNo new version ships until a green cut; the next successful publish closes this issue automatically.' "$GATE_RESULT" "$RELEASE_RESULT" "$RUN_URL")
              # Self-heal the label: `gh issue create --label` hard-fails when the
              # label does not exist, which killed this alert on 2026-07-24 — a
              # dead alert is the worst failure mode this job can have.
              gh label create release-train --repo "$GITHUB_REPOSITORY" \
                --description "Pinned release-train status issue" --color D93F0B --force
              existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label release-train --state open --json number --jq '.[0].number // empty')
              if [ -n "$existing" ]; then
                gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
                gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --title "$title"
              else
                gh issue create --repo "$GITHUB_REPOSITORY" --label release-train --title "$title" --body "$body"
              fi
              echo "::error::release cut failed (gate=$GATE_RESULT, release=$RELEASE_RESULT); release-train issue updated"
