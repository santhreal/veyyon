# Cut a release from CI, so nothing about a release depends on one person's
# workstation. This job does everything `bun run release` used to do locally:
# bump every version, regenerate lockfiles, finalize changelogs, run checks,
# then commit, tag and push.
#
# The push is where this workflow stops. `ci.yml` recognizes the release commit
# and tag and owns everything downstream: platform binaries, the GitHub release,
# npm, Homebrew, and the website deploy that regenerates veyyon.dev/changelog.
name: Release

on:
   workflow_dispatch:
      inputs:
         version:
            description: "Version to release: major, minor, patch, or an explicit x.y.z"
            required: true
            default: "patch"
            type: string

# Never run two releases at once, and never cancel one in flight: a half-pushed
# release (commit without tag, or a tag with no lockfile bump) is far worse than
# a queued one.
concurrency:
   group: release
   cancel-in-progress: false

permissions:
   contents: write

jobs:
   release:
      name: Cut release
      runs-on: ubuntu-22.04
      env:
         # secrets cannot be read in a step-level `if:`, so hoist presence here.
         HAS_RELEASE_PAT: ${{ secrets.RELEASE_PAT != '' }}
      steps:
         # Fail before touching anything if the push cannot trigger the release.
         #
         # GitHub deliberately does not start workflow runs for pushes made with
         # the built-in GITHUB_TOKEN. This job's whole purpose is that its tagged
         # push starts the ci.yml release run, so with only GITHUB_TOKEN it would
         # bump versions, commit, tag and push, report success, and publish
         # nothing. That silent half-release is worse than refusing to start.
         - name: Require a push token that can trigger the release run
           if: ${{ env.HAS_RELEASE_PAT != 'true' }}
           run: |
              echo "::error::RELEASE_PAT is not set. A push made with the built-in GITHUB_TOKEN does not start a workflow run, so the release would be tagged but never published. Create a fine-grained PAT with Contents: read/write on this repo and store it as the RELEASE_PAT secret."
              exit 1

         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              ref: main
              # Full history plus tags: the preflight compares the requested
              # version against `git describe`, which a shallow clone cannot see.
              fetch-depth: 0
              fetch-tags: true
              # Persist the PAT as the credential `git push` uses, so the release
              # commit and tag arrive as a normal push and ci.yml picks them up.
              token: ${{ secrets.RELEASE_PAT }}

         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"

         # `release.ts` runs `bun run check`, whose `check:rs` half is
         # `cargo fmt --check` + `cargo clippy -D warnings`. Both need the
         # toolchain this repo pins in rust-toolchain.toml, with rustfmt and
         # clippy present: a plain stable/minimal install has neither component
         # and the release would fail in its own preflight. Same action and
         # same pin ci.yml uses.
         - uses: ./.github/actions/ensure-rust-toolchain
           with:
              toolchain: nightly-2026-04-29
              components: rustfmt,clippy


         # `release.ts` rewrites the Rust workspace version and the natives
         # version sentinel with `sd`.
         - name: Install sd
           run: cargo install sd --locked

         - name: Install dependencies
           run: bun install --frozen-lockfile

         # The release commit is authored by the workflow, not by whoever
         # clicked run: the commit subject is what ci.yml keys its never-cancel
         # release concurrency group off, and it must be reproducible.
         - name: Configure git identity
           run: |
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

         - name: Cut the release
           env:
              VEYYON_RELEASE_IN_CI: "1"
              # Read-only `gh` use (resolving the origin slug); the push itself
              # goes through the checkout credential above.
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: bun scripts/release.ts "${{ inputs.version }}"

         - name: Summary
           run: |
              echo "### Released \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "The tagged push starts the CI release run, which publishes the" >> "$GITHUB_STEP_SUMMARY"
              echo "binaries, the GitHub release, and the website changelog." >> "$GITHUB_STEP_SUMMARY"
