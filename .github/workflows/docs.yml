# Docs link gate: fails on dead internal markdown links/anchors anywhere in the
# tracked tree (handbook, flat docs, internal docs, READMEs). Complements
# checks.yml, whose push trigger deliberately ignores docs/** and *.md.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check-doc-links.ts"
      - "scripts/check-doc-freshness.ts"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check-doc-links.ts"
      - "scripts/check-doc-freshness.ts"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      # Full history: the freshness gate resolves each doc's verification-stamp
      # commit (`git cat-file -e <sha>`) and its last-edit date (`git log`). A
      # shallow (depth-1) checkout has only the tip commit, so every stamp sha
      # reads as "does not exist" and every doc looks edited at the tip date.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Checker self-tests
        run: bun test scripts/check-doc-links.test.ts scripts/check-doc-freshness.test.ts scripts/docs-book-pin.test.ts
      - name: Check internal markdown links
        run: bun scripts/check-doc-links.ts
      - name: Check internal doc verification stamps
        run: bun scripts/check-doc-freshness.ts

  doc-examples:
    # Asserts every documented command/flag/mcp-block/keybinding/env-var/slash-command/
    # tool/settings-key against the REAL CLI + schema. checks.yml runs this test on code
    # changes but path-ignores docs/**, so without this job a doc-only change that adds a
    # phantom command or setting would ship uncaught.
    name: Docs vs code truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install workspace
        run: bun install --frozen-lockfile
      # docs-examples imports the HTML-export entrypoint, which statically pulls
      # in the gitignored build artifact src/export/html/tool-views.generated.js.
      # A fresh checkout does not have it, so generate it (the binary build does
      # the same) before the test can load that module.
      - name: Generate tool views
        run: bun --cwd=packages/coding-agent run gen:tool-views
      - name: Docs examples match the real CLI
        run: bun test packages/coding-agent/test/docs-examples.test.ts

  book-staleness:
    # The rendered handbook (docs/handbook/book) is committed because the
    # website deploy serves it via the website/docs symlink. Committed build
    # output goes stale silently; this job fails when the committed book does
    # not match a fresh `mdbook build` of docs/handbook/src at the pinned
    # mdbook version (keep the pin in sync with the version contributors use).
    name: Handbook book freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Rebuild handbook
        run: mdbook build docs/handbook
      - name: Committed book matches sources
        run: |
          if ! git diff --exit-code --stat -- docs/handbook/book; then
            echo "::error::docs/handbook/book is stale — run 'mdbook build' in docs/handbook (mdbook v0.5.2) and commit the result."
            exit 1
          fi
