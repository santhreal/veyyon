# Fast checks for the veyyon harness: lint + type check and the TypeScript test
# suite. Runs on GitHub-hosted runners. Security scanning (keyhog secret scan,
# cargo-deny, cargo-audit, bun audit, CodeQL SAST) lives in security.yml.
name: Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "checks-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Biome check + workspace type check
        run: bun run check:ts
      - name: Lint
        run: bun run lint:ts

  changelog:
    name: Changelog entry
    # Gate BOTH PRs and direct pushes to main. This repo lands changes directly
    # on main (no PR), so a PR-only gate never fires and hundreds of commits
    # shipped source with an empty `## [Unreleased]` section — releases then
    # documented almost nothing. On a push the base is `github.event.before`
    # (the branch tip before the push); the gate fails when a publishable
    # package's shipped source changed with no `## [Unreleased]` entry.
    #
    # Two push cases are exempt:
    #   - `github.event.before` all-zeros: a first push / force-push / branch
    #     create has no prior tip to diff against.
    #   - `chore: bump version to ...`: the release workflow's own bump commit,
    #     which drains the Unreleased section by design and legitimately adds
    #     no new entry.
    # The `[skip changelog]` / `[skip changelog: <pkg>]` commit markers remain
    # the escape hatch for a genuine no-user-impact source change.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.event.before != '0000000000000000000000000000000000000000' &&
       !startsWith(github.event.head_commit.message, 'chore: bump version to'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the merge-base against the base ref resolves.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Require a changelog entry for changed source
        env:
          # PR: the base commit GitHub records for the PR. Push: the branch tip
          # before this push. Either is an ancestor reachable in the full
          # history checked out above, so no extra fetch is needed.
          CHANGELOG_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: bun run changelog:check
      - name: Require the repo-root CHANGELOG to match the canonical source
        # The root CHANGELOG.md is generated from packages/coding-agent/CHANGELOG.md
        # (same rebrand the website uses). Fail if it drifted; the fix is to run
        # `bun run changelog:root`.
        run: bun run changelog:root:check

  test:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Build native addon
        # The workspace test bucket exercises the Rust natives (grep, PTY,
        # hashline) via their compiled Node addon; build it before the tests
        # so they don't fall back to a missing `veyyon_natives` binary.
        run: bun run ci:build:native
      - name: Workspace test suite
        run: bun run ci:test:ts:workspace
