# Fast checks for the veyyon harness: lint + type check and the TypeScript test
# suite. Runs on GitHub-hosted runners. Security scanning (keyhog secret scan,
# cargo-deny, cargo-audit, bun audit, CodeQL SAST) lives in security.yml.
name: Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "checks-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Biome check + workspace type check
        run: bun run check:ts
      - name: Lint
        run: bun run lint:ts

  changelog:
    name: Changelog entry
    # PRs only: a push to main is a merge or the release commit, neither of which
    # can meaningfully be blocked here. The gate fails a PR that changes a
    # publishable package's shipped source without adding a `## [Unreleased]`
    # entry, so a feature can never merge without reaching the changelog.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the merge-base against the PR base resolves.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Require a changelog entry for changed source
        env:
          # The base commit GitHub records for the PR; an ancestor of the merge
          # ref checked out above, so no extra fetch is needed.
          CHANGELOG_BASE: ${{ github.event.pull_request.base.sha }}
        run: bun run changelog:check
      - name: Require the repo-root CHANGELOG to match the canonical source
        # The root CHANGELOG.md is generated from packages/coding-agent/CHANGELOG.md
        # (same rebrand the website uses). Fail if it drifted; the fix is to run
        # `bun run changelog:root`.
        run: bun run changelog:root:check

  test:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Build native addon
        # The workspace test bucket exercises the Rust natives (grep, PTY,
        # hashline) via their compiled Node addon; build it before the tests
        # so they don't fall back to a missing `veyyon_natives` binary.
        run: bun run ci:build:native
      - name: Workspace test suite
        run: bun run ci:test:ts:workspace
