# Public-runner checks for the veyyon harness: lint + type check, the TypeScript
# test suite, and a keyhog secret scan. Runs on GitHub-hosted runners so it works
# on the public repo without the self-hosted `omp-kata` runners the release
# pipeline (ci.yml) uses.
name: Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "checks-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Biome check + workspace type check
        run: bun run check:ts
      - name: Lint
        run: bun run lint:ts

  test:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Build native addon
        # The workspace test bucket exercises the Rust natives (grep, PTY,
        # hashline) via their compiled Node addon; build it before the tests
        # so they don't fall back to a missing `pi_natives` binary.
        run: bun run ci:build:native
      - name: Workspace test suite
        run: bun run ci:test:ts:workspace

  secret-scan:
    name: Secret scan (keyhog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Hyperscan runtime
        # keyhog links libhyperscan (libhs.so.5) for its regex engine; it isn't
        # preinstalled on the runner.
        run: sudo apt-get update && sudo apt-get install -y libhyperscan5
      - name: Install keyhog
        # Pin a release and fetch the linux binary directly with a SHA-256 check.
        # keyhog's install.sh insists on a full signed GPU-sidecar bundle that
        # isn't needed for a CPU-backend CI scan, so the direct download is the
        # robust, reproducible path here.
        env:
          KEYHOG_VERSION: v0.5.40
        run: |
          base="https://github.com/santhreal/keyhog/releases/download/${KEYHOG_VERSION}"
          curl -fsSL -o keyhog "$base/keyhog-linux-x86_64"
          curl -fsSL -o keyhog.sha256 "$base/keyhog-linux-x86_64.sha256"
          echo "$(awk '{print $1}' keyhog.sha256)  keyhog" | sha256sum -c -
          chmod +x keyhog
          mkdir -p "$HOME/.local/bin"
          mv keyhog "$HOME/.local/bin/keyhog"
          "$HOME/.local/bin/keyhog" --version
      - name: Scan the repo for new secrets
        # --precision drops entropy/ML-speculative noise and raises the confidence
        # floor; the committed baseline suppresses the known public OAuth client IDs
        # and test fixtures, so the job fails only on a genuinely NEW leak.
        #
        # keyhog fails closed (exit 13) when it cannot scan every byte — e.g. the
        # image/tarball/embedded-byte test fixtures it detects as binary. A real
        # secret in *text* still yields exit 1 even when binaries are present
        # (verified), so exit 13 provably means "no findings, coverage just
        # incomplete." We therefore gate on exit-code semantics rather than a
        # fragile hand-maintained binary exclude-list: fail on secrets (1/10) or a
        # genuine source failure, tolerate benign binary skips.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          keyhog scan . \
            --precision \
            --backend cpu \
            --baseline .keyhog-baseline.json \
            --exclude-paths node_modules \
            --exclude-paths target \
            --exclude-paths '**/target' \
            --exclude-paths .git \
            --exclude-paths dist \
            --exclude-paths '**/dist' \
            --exclude-paths '**/adv-debug-*' \
            2> keyhog.stderr
          code=$?
          set -e
          cat keyhog.stderr
          case "$code" in
            0)
              echo "keyhog: clean, full coverage." ;;
            1|10)
              echo "::error::keyhog found secret material (exit $code)."
              exit 1 ;;
            13)
              # Coverage incomplete. Fail only if a real source failure caused it;
              # benign binary/unreadable-file skips are expected on this tree.
              if grep -qiE 'requested source failed|permission denied|no such file|i/o error|failed to read' keyhog.stderr; then
                echo "::error::keyhog could not read a requested source (exit 13)."
                exit 1
              fi
              echo "keyhog: no secrets found; some binary files were unscannable (benign)." ;;
            *)
              echo "::error::keyhog exited unexpectedly (exit $code)."
              exit 1 ;;
          esac
