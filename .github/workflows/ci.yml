name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]
   workflow_dispatch:

# Release runs publish a `v*` tag pushed atomically with main HEAD; sharing
# the cheap branch-wide `CI-refs/heads/main` group meant a later main push
# silently cancelled the in-flight release and left the tag without a GitHub
# Release (#2564). Detect release runs at workflow-scheduling
# time via the release-script commit subject (`chore: bump version to X.Y.Z`),
# via `v*` tag-ref dispatches, and via manual dispatches whose tag-on-HEAD
# status is only known after checkout; scope them to a per-sha group with no
# cancellation. Every other event keeps branch-wide cancellation for PR/main churn.
concurrency:
   group: "${{ github.workflow }}-${{ (startsWith(github.event.head_commit.message, 'chore: bump version to ') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && format('release-{0}', github.sha) || github.ref }}"
   cancel-in-progress: "${{ !(startsWith(github.event.head_commit.message, 'chore: bump version to ') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}"

env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
   # glibc floor for shipped linux native addons. A stock Ubuntu runner links its
   # own (newer) glibc symbol versions and would fail to dlopen on older distros.
   # Building the linux-gnu addons through cargo-zigbuild against this floor keeps
   # them portable. Bump to raise the minimum supported glibc.
   GLIBC_FLOOR: "2.17"

permissions:
   contents: read
   actions: read

jobs:
   # scripts/release.ts pushes the version-bump commit and its `v*` tag
   # atomically (`git push --atomic origin refs/heads/main:refs/heads/main
   # <sha>:refs/tags/v<version>`), so a release now arrives as a single `push` to
   # `refs/heads/main` — we no longer trigger on the tag ref at all (see
   # `on.push`). This one branch-push run is therefore authoritative: it runs the
   # full build AND, when HEAD carries a release tag, the release/publish jobs.
   # `release_metadata` resolves that tag once so downstream jobs switch on
   # `is-release` and address the tag by name — `github.ref` is
   # `refs/heads/main` here, not the tag. A `workflow_dispatch` from a `v*` tag
   # ref (or from a tagged main HEAD) is also treated as a release.
   release_metadata:
      name: Resolve release metadata
      runs-on: ubuntu-22.04
      outputs:
         is-release: ${{ steps.detect.outputs.is-release }}
         release-tag: ${{ steps.detect.outputs.release-tag }}
      steps:
         # Only a main-branch run needs tags fetched, so `git tag --points-at
         # HEAD` can see the freshly-pushed `v*`. A tag-ref dispatch reads the
         # tag straight from `github.ref_name`, and fetching `--tags` while
         # checkout uses an explicit tag refspec makes git refuse — so scope
         # fetch-tags to main refs.
         - uses: actions/checkout@v4
           with:
              fetch-tags: ${{ github.ref == 'refs/heads/main' }}
         - name: Detect release tag at HEAD
           id: detect
           shell: bash
           run: |
              is_release=false
              release_tag=""
              case "${{ github.ref }}" in
                refs/tags/v[0-9]*)
                  release_tag="${{ github.ref_name }}"
                  ;;
                refs/heads/main)
                  if [ "${{ github.event_name }}" != "pull_request" ]; then
                    release_tag=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -n1 || true)
                  fi
                  ;;
              esac
              if [ -n "$release_tag" ]; then
                echo "HEAD carries release tag $release_tag; this run builds and publishes the release."
                is_release=true
              fi
              {
                echo "is-release=$is_release"
                echo "release-tag=$release_tag"
              } >> "$GITHUB_OUTPUT"

   # Exercise the release-notes generator on every main push / PR, not only when
   # a real `v*` tag is cut. release_github (the job that actually runs
   # ci-release-notes.ts) is tag-only, so a runtime bug in that script never
   # touches main CI and only surfaces when a doomed tag is already published —
   # this is how v1.0.13-1.0.21 shipped with broken release jobs. This job runs
   # the generator against the latest published tag (a known-good target,
   # reproducing that release's notes) so a crash, a bad git range, a gh output
   # change, or an empty body is caught here, before any tag exists. It never
   # publishes anything.
   release_notes_dryrun:
      name: Release notes dry-run
      runs-on: ubuntu-22.04
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              # The generator does `git log vPREV..vTARGET`, so it needs full
              # history and the tag refs — the same requirement as release_github.
              fetch-depth: 0
              fetch-tags: true
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Generate notes for the latest published release
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           shell: bash
           run: |
              set -euo pipefail
              tag=$(gh release list --repo "${{ github.repository }}" --limit 1 \
                    --exclude-drafts --exclude-pre-releases --json tagName \
                    --jq '.[0].tagName // ""')
              if [ -z "$tag" ]; then
                echo "No published release yet; nothing to dry-run. (First release generates notes for the first time on its own tag.)"
                exit 0
              fi
              echo "Dry-running ci-release-notes.ts against $tag ..."
              bun scripts/ci-release-notes.ts "$tag" release-notes-dryrun.md
              if [ ! -s release-notes-dryrun.md ]; then
                echo "::error::ci-release-notes.ts produced an EMPTY body for $tag. A published release with real commits must not ship an empty body."
                exit 1
              fi
              echo "--- generated notes ($(wc -l < release-notes-dryrun.md) lines) ---"
              cat release-notes-dryrun.md

   # Compute a stable hash of every input that affects the native cdylib output,
   # then look for any prior successful main run that already uploaded the
   # native artifacts for this hash. Two independent outputs:
   #   * `linux-x64-run-id` — set when the linux x64 canary
   #     (`veyyon-natives-linux-x64-modern-h<hash>`) is present on a prior main run,
   #     so native-dependent TS test jobs and `native_linux_x64` can reuse it.
   #   * `cross-platform-run-id` — set when ALL cross-platform native artifacts
   #     also have non-expired artifacts on that same prior run, so
   #     `native_cross_platform` can skip the cold rebuild on main pushes after
   #     dep changes have already warmed sccache there.
   # Non-release native jobs are skipped when their canary hits; the canary
   # retention window (see build-native action) is the effective TTL.
   native_artifact_lookup:
      name: Look up cached native artifacts
      runs-on: ubuntu-22.04
      outputs:
         source-hash: ${{ steps.compute.outputs.source-hash }}
         linux-x64-run-id: ${{ steps.find.outputs.linux-x64-run-id }}
         cross-platform-run-id: ${{ steps.find.outputs.cross-platform-run-id }}
      steps:
         - uses: actions/checkout@v4
         - name: Compute native source hash
           id: compute
           shell: bash
           run: |
              source_hash=$(find crates Cargo.toml Cargo.lock rust-toolchain.toml \
                      packages/natives/scripts packages/natives/package.json \
                      scripts/ci-build-native.ts scripts/host-detect.ts \
                      -type f -print0 \
                    | sort -z \
                    | xargs -0 sha256sum \
                    | sha256sum \
                    | cut -c1-16)
              echo "source-hash=$source_hash" >> "$GITHUB_OUTPUT"
              echo "Native source hash: $source_hash"
         - name: Find prior main build with matching native artifacts
           id: find
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           shell: bash
           run: |
              hash="${{ steps.compute.outputs.source-hash }}"
              # Canary for native_linux_x64: presence of the modern artifact
              # implies the baseline sibling is also there (they upload from the
              # same job).
              linux_canary="veyyon-natives-linux-x64-modern-h${hash}"
              # Required set for cross-platform reuse — names must match the
              # `actions/upload-artifact` `name:` template in build-native action.
              cross_platform_required=(
                "veyyon-natives-linux-arm64-h${hash}"
                "veyyon-natives-darwin-x64-baseline-h${hash}"
                "veyyon-natives-darwin-arm64-h${hash}"
                "veyyon-natives-win32-x64-baseline-h${hash}"
              )
              linux_x64_run_id=""
              cross_platform_run_id=""
              for candidate in $(gh run list \
                  --workflow=ci.yml --branch=main --status=success --event=push \
                  --limit=20 --json databaseId --jq='.[].databaseId'); do
                names=$(gh api "/repos/${{ github.repository }}/actions/runs/$candidate/artifacts?per_page=100" \
                    --jq '.artifacts[] | select(.expired == false) | .name')
                if [ -z "$linux_x64_run_id" ] && echo "$names" | grep -qFx "$linux_canary"; then
                  linux_x64_run_id="$candidate"
                fi
                if [ -z "$cross_platform_run_id" ]; then
                  all_found=true
                  # Cross-platform reuse requires the linux canary AND every
                  # cross-platform artifact, since release_binary downloads them
                  # from the same run.
                  if ! echo "$names" | grep -qFx "$linux_canary"; then
                    all_found=false
                  else
                    for req in "${cross_platform_required[@]}"; do
                      if ! echo "$names" | grep -qFx "$req"; then
                        all_found=false
                        break
                      fi
                    done
                  fi
                  if $all_found; then
                    cross_platform_run_id="$candidate"
                  fi
                fi
                if [ -n "$linux_x64_run_id" ] && [ -n "$cross_platform_run_id" ]; then
                  break
                fi
              done
              if [ -n "$linux_x64_run_id" ]; then
                echo "Reusing Linux x64 native artifacts from run $linux_x64_run_id"
              else
                echo "No cached Linux x64 native artifacts for hash $hash; native_linux_x64 will rebuild."
              fi
              if [ -n "$cross_platform_run_id" ]; then
                echo "Reusing cross-platform native artifacts from run $cross_platform_run_id"
              else
                echo "No cached cross-platform native artifacts for hash $hash; native_cross_platform will rebuild on main."
              fi
              {
                echo "linux-x64-run-id=$linux_x64_run_id"
                echo "cross-platform-run-id=$cross_platform_run_id"
              } >> "$GITHUB_OUTPUT"

   # Fast lint, type check, and browser bundle build (no Rust, no native build needed)
   check:
      name: Lint, type check & web build
      runs-on: ubuntu-22.04
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/bun-install
         - name: Type check workspace
           run: bun run ci:check:full
         - name: Build collab web
           run: bun run collab:web:build

   # Linux x64 baseline + modern: required by `test`, so it runs on every PR
   # unless native_artifact_lookup found a cached run. Release runs always
   # rebuild for fresh artifacts.
   native_linux_x64:
      name: "Native: Linux x64 (${{ matrix.variant }})"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ needs.release_metadata.outputs.is-release == 'true' || needs.native_artifact_lookup.outputs.linux-x64-run-id == '' }}
      runs-on: ubuntu-22.04
      strategy:
         fail-fast: false
         matrix:
            include:
               - { variant: baseline, rust_checks: true }
               - { variant: modern }
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: linux
              arch: x64
              variant: ${{ matrix.variant }}
              glibc: ${{ env.GLIBC_FLOOR }}
              rust_checks: ${{ matrix.rust_checks && 'true' || 'false' }}
              save_cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

   # Pre-warm the cross-platform native build cache on `main`, in addition to
   # building the artifacts that ship in releases. Skipped on main when
   # native_artifact_lookup already found a recent run with all artifacts intact.
   native_cross_platform_cross:
      name: "Native: ${{ matrix.platform }} ${{ matrix.arch }}"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ needs.release_metadata.outputs.is-release == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.native_artifact_lookup.outputs.cross-platform-run-id == '') }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: ubuntu-24.04-arm, platform: linux, arch: arm64, target: aarch64-unknown-linux-gnu }
               - { os: ubuntu-22.04, platform: win32, arch: x64, target: x86_64-pc-windows-msvc, variant: baseline }
      runs-on: ${{ matrix.os }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: ${{ matrix.platform }}
              arch: ${{ matrix.arch }}
              variant: ${{ matrix.variant }}
              target: ${{ matrix.target }}
              glibc: ${{ matrix.platform == 'linux' && env.GLIBC_FLOOR || '' }}
              save_cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

   native_cross_platform_macos:
      name: "Native: ${{ matrix.platform }} ${{ matrix.arch }}"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ needs.release_metadata.outputs.is-release == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.native_artifact_lookup.outputs.cross-platform-run-id == '') }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: macos-15-intel, platform: darwin, arch: x64, variant: baseline }
               - { os: macos-14, platform: darwin, arch: arm64 }
      runs-on: ${{ matrix.os }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: ${{ matrix.platform }}
              arch: ${{ matrix.arch }}
              variant: ${{ matrix.variant }}
              target: ${{ matrix.target }}
              save_cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
   test_workspace:
      name: Test TS workspace fast
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 20
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test workspace packages and repo scripts (TS)
           run: bun run ci:test:ts:workspace

   test_coding_agent_singleton:
      name: Test coding-agent singleton/global-state (TS)
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 20
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent singleton/global-state bucket
           # Keep global Settings/env/fake-timer tests serial; native addon
           # artifacts are still available like every other coding-agent bucket.
           run: bun run ci:test:coding-agent:singleton

   test_ts_native:
      name: Test TS native/integration packages
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test native/TUI/browser-ish packages (TS)
           run: bun run ci:test:ts:native

   test_coding_agent_ui:
      name: Test coding-agent UI/TUI (TS)
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent UI/TUI bucket
           run: bun run ci:test:coding-agent:ui

   test_coding_agent_runtime:
      name: Test coding-agent runtime/session (TS)
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent runtime bucket
           # Runtime/session tests import native-backed barrels too; keep this
           # separate for concurrency, not as a native-free guardrail.
           run: bun run ci:test:coding-agent:runtime

   test_coding_agent_native:
      name: Test coding-agent native/unit (TS)
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent native/unit bucket
           run: bun run ci:test:coding-agent:native

   test_smoke:
      name: Test CLI smoke (TS)
      runs-on: ubuntu-22.04
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 15
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: veyyon-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: CLI smoke test
           run: bun run ci:test:smoke

   install_methods:
      name: Install method smoke tests
      runs-on: ubuntu-22.04
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/ensure-rust-toolchain
           with:
              toolchain: nightly-2026-04-29
         - name: Setup sccache
           uses: mozilla-actions/sccache-action@v0.0.10
         - name: Enable sccache for cargo
           # sccache-action exports the GHA cache URL/token; CARGO_INCREMENTAL=0
           # keeps sccache from silently no-oping.
           shell: bash
           run: |
              {
                echo "RUSTC_WRAPPER=sccache"
                echo "CARGO_INCREMENTAL=0"
                echo "SCCACHE_GHA_ENABLED=true"
              } >> "$GITHUB_ENV"
              echo "sccache backend: GitHub Actions cache"
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Install method smoke tests
           run: bun run ci:test:install-methods

   install_ps1_functions:
      name: Windows installer function tests
      # install.ps1 is a shipped install channel; run its helper-function tests
      # on a real Windows shell so the PATH-wiring logic (which never ran on the
      # Linux runners) is actually gated. pwsh ships on windows-latest.
      runs-on: windows-latest
      steps:
         - uses: actions/checkout@v4
         - name: install.ps1 function tests
           shell: pwsh
           run: pwsh -File scripts/install-tests/functions.test.ps1

   release_binary:
      name: "Release binary: ${{ matrix.target_id }}"
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.native_linux_x64.result == 'success' && needs.native_cross_platform_cross.result ==
         'success' && needs.native_cross_platform_macos.result == 'success' &&
         needs.test_workspace.result == 'success' &&
         needs.test_coding_agent_singleton.result == 'success' &&
         needs.test_ts_native.result == 'success' &&
         needs.test_coding_agent_ui.result == 'success' &&
         needs.test_coding_agent_runtime.result == 'success' &&
         needs.test_coding_agent_native.result == 'success' &&
         needs.test_smoke.result == 'success' && needs.check.result == 'success' &&
         needs.install_methods.result == 'success' }}
      needs: [release_metadata, check, native_linux_x64, native_cross_platform_cross, native_cross_platform_macos, test_workspace, test_coding_agent_singleton, test_ts_native, test_coding_agent_ui, test_coding_agent_runtime, test_coding_agent_native, test_smoke, install_methods, native_artifact_lookup]
      strategy:
         fail-fast: false
         matrix:
            include:
               - {
                    os: ubuntu-22.04,
                    platform: linux,
                    arch: x64,
                    target_id: linux-x64,
                    binary_path: packages/coding-agent/binaries/veyyon-linux-x64,
                 }
               - {
                    os: ubuntu-24.04-arm,
                    platform: linux,
                    arch: arm64,
                    target_id: linux-arm64,
                    binary_path: packages/coding-agent/binaries/veyyon-linux-arm64,
                 }
               - {
                    os: macos-15-intel,
                    platform: darwin,
                    arch: x64,
                    target_id: darwin-x64,
                    binary_path: packages/coding-agent/binaries/veyyon-darwin-x64,
                 }
               - {
                    os: macos-14,
                    platform: darwin,
                    arch: arm64,
                    target_id: darwin-arm64,
                    binary_path: packages/coding-agent/binaries/veyyon-darwin-arm64,
                 }
               - {
                    os: ubuntu-22.04,
                    platform: win32,
                    arch: x64,
                    target_id: win32-x64,
                    binary_path: packages/coding-agent/binaries/veyyon-windows-x64.exe,
                 }
      runs-on: ${{ matrix.os }}
      permissions:
         contents: read
      env:
         MACOS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' && secrets.APPLE_API_KEY != '' }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
           env:
              SCCACHE_BUCKET: ""
              AWS_ACCESS_KEY_ID: ""
         - name: Cache bun dependencies
           uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
           with:
              path: ~/.bun/install/cache
              key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
         - run: bun install --frozen-lockfile
         - name: Download native addon(s)
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: veyyon-natives-${{ matrix.platform }}-${{ matrix.arch }}*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
         - name: Build release binary
           env:
              RELEASE_TARGETS: ${{ matrix.target_id }}
           run: bun run ci:release:build-binaries
         - name: Sign and notarize macOS binary (Developer ID)
           # Replaces the ad-hoc signature with a Developer ID + hardened-runtime
           # one (+JIT/library-validation entitlements; veyyon dlopens its
           # runtime-extracted native addon, which has a different Team ID) and
           # notarizes. Auto-skips until the APPLE_* secrets are configured.
           if: matrix.platform == 'darwin' && env.MACOS_SIGNING == 'true'
           env:
              APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
              APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
              APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
              APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
           run: bash scripts/ci-macos-sign.sh "${{ matrix.binary_path }}"
         # Windows binary is cross-built on Linux, so we have no Windows runner
         # to smoke it on. Cross-build correctness is verified via the napi
         # entry-point exports (see build-native action) and the bun
         # `--compile --target=bun-windows-x64-*` cross-compile.
         - name: Smoke release binary
           if: matrix.platform != 'win32'
           run: |
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" "${{ matrix.binary_path }}" --version
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" "${{ matrix.binary_path }}" --smoke-test
         - name: Upload release binary artifact
           uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
           with:
              name: veyyon-binary-${{ matrix.target_id }}
              path: ${{ matrix.binary_path }}

   release_github:
      name: Publish GitHub release
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_binary.result == 'success' }}
      needs: [release_metadata, release_binary]
      runs-on: ubuntu-22.04
      permissions:
         contents: write
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              # Full history + tags so ci-release-notes.ts can `git log
              # vPREV..vTARGET` for the commit-history summary. A shallow
              # default checkout has neither the range's commits nor the tag
              # refs, so the summary would be skipped and the body would fall
              # back to the (often one-line) curated changelog.
              fetch-depth: 0
              fetch-tags: true
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Generate release notes from CHANGELOGs
           env:
              # `gh release list` (used to find the latest published GitHub
              # Release tag below the target so silent-tag changelog sections
              # roll forward — #2596) requires GH_TOKEN in Actions. Without
              # it gh exits non-zero and the script would degrade to legacy
              # single-version notes, defeating the recovery.
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: bun scripts/ci-release-notes.ts ${{ needs.release_metadata.outputs.release-tag }}
         - name: Download release binaries
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: veyyon-binary-*
              path: packages/coding-agent/binaries
              merge-multiple: true
         - name: Generate SHA-256 sidecars
           # install.sh / install.ps1 fail closed when a release binary has no
           # published <asset>.sha256 sidecar, so every binary must get one here.
           run: |
              cd packages/coding-agent/binaries
              for f in veyyon-*; do
                case "$f" in *.sha256) continue ;; esac
                sha256sum "$f" > "$f.sha256"
              done
              cat ./*.sha256
         - name: Create GitHub Release
           uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
           with:
              tag_name: ${{ needs.release_metadata.outputs.release-tag }}
              files: |
                 packages/coding-agent/binaries/veyyon-*
              body_path: release-notes.md
              generate_release_notes: true


   release_site:
      # Autosync the website changelog on every published release. The generator
      # reconciles packages/coding-agent/CHANGELOG.md against the live GitHub
      # Releases (real publish dates + permalinks), so the site updates itself
      # instead of drifting until someone remembers to redeploy by hand.
      name: Deploy website (changelog autosync)
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_github.result == 'success' && vars.SITE_AUTODEPLOY != 'off' }}
      needs: [release_metadata, release_github]
      runs-on: ubuntu-22.04
      permissions:
         contents: read
      env:
         # secrets can't be used in step-level `if:`; hoist presence to a job env.
         HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Regenerate changelog + build site (brand check gates)
           # GITHUB_REPOSITORY is auto-set; gen-changelog reconciles against it.
           run: node website/build.mjs
         - name: Deploy to Cloudflare Pages (project veyyon → veyyon.dev)
           if: ${{ env.HAS_CF_TOKEN == 'true' }}
           env:
              CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
           run: bunx wrangler@latest pages deploy website --project-name veyyon --branch main --commit-dirty=true
         # get.veyyon.dev is the `curl | sh` install endpoint. It deploys a
         # SEPARATE tree (website-get/: the two install scripts + a root rewrite
         # to install.sh) so its root serves the script, not the marketing
         # index.html — deploying the full website/ tree here put HTML at the get
         # root and broke `curl -fsSL https://get.veyyon.dev | sh`. build.mjs
         # generates website-get/. Redeploy on every release so the served
         # install script stays current. Same token/account; only the project
         # and the tree differ.
         - name: Deploy to Cloudflare Pages (project veyyon-get → get.veyyon.dev)
           if: ${{ env.HAS_CF_TOKEN == 'true' }}
           env:
              CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
           run: bunx wrangler@latest pages deploy website-get --project-name veyyon-get --branch main --commit-dirty=true
         - name: No deploy token — built only
           if: ${{ env.HAS_CF_TOKEN != 'true' }}
           run: |
              echo "::warning::CLOUDFLARE_API_TOKEN is not set — the site was rebuilt and brand-checked but NOT deployed."
              echo "Add CLOUDFLARE_API_TOKEN (and optionally CLOUDFLARE_ACCOUNT_ID) as repo secrets to enable release autodeploy."

   release_github_verify:
      name: Verify published release (macOS)
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_github.result == 'success' }}
      needs: [release_metadata, release_github]
      runs-on: macos-14
      permissions:
         contents: read
      env:
         MACOS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' && secrets.APPLE_API_KEY != '' }}
      steps:
         - name: Download published macOS arm64 binary and checksum sidecar
           run: |
              base="https://github.com/${{ github.repository }}/releases/download/${{ needs.release_metadata.outputs.release-tag }}"
              curl -fsSL -o veyyon-darwin-arm64 "$base/veyyon-darwin-arm64"
              curl -fsSL -o veyyon-darwin-arm64.sha256 "$base/veyyon-darwin-arm64.sha256"
              chmod +x veyyon-darwin-arm64
         - name: Verify the published .sha256 sidecar (install.sh fails closed without it)
           run: |
              # install.sh refuses to install any binary whose published checksum is
              # missing or mismatched, on every platform — so the darwin sidecar must
              # be verified here too, not only the linux one.
              shasum -a 256 -c veyyon-darwin-arm64.sha256
         - name: Verify published macOS arm64 binary
           run: |
              codesign -dvvv ./veyyon-darwin-arm64
              codesign --verify --strict --verbose=4 ./veyyon-darwin-arm64
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./veyyon-darwin-arm64 --version
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./veyyon-darwin-arm64 --smoke-test
         - name: Assert signed release is not ad-hoc
           if: env.MACOS_SIGNING == 'true'
           run: |
              if codesign -dvvv ./veyyon-darwin-arm64 2>&1 | grep -qE "flags=.*adhoc|Signature=adhoc"; then
                echo "published binary is still ad-hoc signed (Developer ID signing did not run)" >&2
                exit 1
              fi
              # Gatekeeper assessment: a notarized Developer ID binary is accepted.
              # Informational — a bare (unstapled) Mach-O relies on the online ticket
              # lookup, so surface the result without gating the release on it.
              spctl -a -t exec -vv ./veyyon-darwin-arm64 || echo "spctl non-zero (expected for unstapled bare binary; ticket served online)"

   release_github_verify_linux:
      # linux-x64 is the most common `curl | sh` target, but the macOS verify job
      # above never launches it — a broken linux binary (or a native addon that
      # fails to load on a real launch) could publish unnoticed. Download the
      # published asset exactly as install.sh does, verify the .sha256 sidecar
      # install.sh requires, then run --version and --smoke-test in a clean HOME.
      # --smoke-test forces the core @veyyon/natives addon to load, so this is the
      # end-to-end proof that the shipped linux binary actually starts.
      name: Verify published release (linux-x64)
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_github.result == 'success' }}
      needs: [release_metadata, release_github]
      runs-on: ubuntu-22.04
      permissions:
         contents: read
      steps:
         - name: Download published linux-x64 binary and checksum sidecar
           run: |
              base="https://github.com/${{ github.repository }}/releases/download/${{ needs.release_metadata.outputs.release-tag }}"
              curl -fsSL -o veyyon-linux-x64 "$base/veyyon-linux-x64"
              curl -fsSL -o veyyon-linux-x64.sha256 "$base/veyyon-linux-x64.sha256"
              chmod +x veyyon-linux-x64
         - name: Verify the published .sha256 sidecar (install.sh fails closed without it)
           run: |
              # The sidecar is `<hash>  veyyon-linux-x64`, so `-c` checks it against
              # the downloaded file. install.sh refuses to install a binary whose
              # published checksum is missing or mismatched, so a bad sidecar must
              # fail the release here, not a user's install.
              sha256sum -c veyyon-linux-x64.sha256
         - name: Launch the published linux-x64 binary (forces native-addon load)
           run: |
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./veyyon-linux-x64 --version
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./veyyon-linux-x64 --smoke-test

   release_github_verify_windows:
      # Windows is a first-class install channel (install.ps1), but neither verify
      # job above ever launches the Windows binary — a broken .exe, a missing/wrong
      # .sha256 sidecar (install.ps1 fails closed without it), or a native addon
      # that will not load on Windows could publish unnoticed. Download the
      # published asset exactly as install.ps1 does, verify the sidecar the way
      # install.ps1 requires (Get-FileHash), then run --version and --smoke-test in
      # a clean HOME. --smoke-test forces the core @veyyon/natives addon to load,
      # so this is the end-to-end proof that the shipped Windows binary starts.
      name: Verify published release (windows-x64)
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_github.result == 'success' }}
      needs: [release_metadata, release_github]
      runs-on: windows-latest
      # Post-publish verification (like the macOS/linux verify jobs): it does not
      # gate the publish, so cap it so a smoke-test that hangs on Windows fails
      # fast and loud instead of holding a runner.
      timeout-minutes: 15
      permissions:
         contents: read
      steps:
         - name: Download published windows-x64 binary and checksum sidecar
           shell: pwsh
           run: |
              $base = "https://github.com/${{ github.repository }}/releases/download/${{ needs.release_metadata.outputs.release-tag }}"
              Invoke-WebRequest -Uri "$base/veyyon-windows-x64.exe" -OutFile veyyon-windows-x64.exe
              Invoke-WebRequest -Uri "$base/veyyon-windows-x64.exe.sha256" -OutFile veyyon-windows-x64.exe.sha256
         - name: Verify the published .sha256 sidecar (install.ps1 fails closed without it)
           shell: pwsh
           run: |
              # The sidecar is "<hash>  veyyon-windows-x64.exe"; take the leading hash
              # token and compare it case-insensitively to the file's SHA-256, exactly
              # as install.ps1 does. A missing or mismatched sidecar fails the release
              # here rather than a user's install.
              $expected = ((Get-Content -Raw veyyon-windows-x64.exe.sha256).Trim() -split '\s+')[0].ToLower()
              if ([string]::IsNullOrWhiteSpace($expected)) { throw "published sidecar is empty/unparseable" }
              $actual = (Get-FileHash -Path veyyon-windows-x64.exe -Algorithm SHA256).Hash.ToLower()
              if ($actual -ne $expected) { throw "checksum mismatch: expected $expected, got $actual" }
              Write-Host "checksum verified: $actual"
         - name: Launch the published windows-x64 binary (forces native-addon load)
           shell: pwsh
           run: |
              $runtimeDir = Join-Path $env:TEMP "veyyon-verify-$PID"
              $env:HOME = Join-Path $runtimeDir "home"
              $env:USERPROFILE = $env:HOME
              $env:XDG_DATA_HOME = Join-Path $runtimeDir "xdg"
              & .\veyyon-windows-x64.exe --version
              if ($LASTEXITCODE -ne 0) { throw "veyyon-windows-x64.exe --version failed with exit $LASTEXITCODE" }
              & .\veyyon-windows-x64.exe --smoke-test
              if ($LASTEXITCODE -ne 0) { throw "veyyon-windows-x64.exe --smoke-test failed with exit $LASTEXITCODE" }

