# Upstream radar: veyyon forked can1357/oh-my-pi and diverged, but upstream
# ships real-world fixes faster than any human can triage. Every 30 minutes
# this mirrors each newly MERGED upstream PR into one issue labeled
# `upstream-port` + `jules`; the Jules async coding agent (connected to this
# repo, label trigger `jules`) evaluates applicability post-divergence and
# opens an adapted port PR. Humans and autoreview.yml gate the merge.
# Idempotent: dedup is a marker in the issue body (see scripts/upstream-radar.ts).
name: Upstream radar

on:
  schedule:
    # Every 30 minutes, offset to avoid the on-the-hour cron stampede.
    - cron: "7,37 * * * *"
  workflow_dispatch:

concurrency:
  group: upstream-radar
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  radar:
    name: Mirror merged upstream PRs into port issues
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"
      # No `bun install`: the script is dependency-free (fetch + std only), so
      # the radar cannot be broken by a workspace install failure.
      - name: Run the radar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun scripts/upstream-radar.ts
