name: Setup system deps
description: >-
   Install the canvas/native runtime deps CI needs (cairo/pango stack, fd,
   ripgrep, imagemagick). Skips the apt round-trip when a runner already ships
   them; self-heals on a stock runner by installing via apt.

runs:
   using: composite
   steps:
      - name: Install system deps (skip when already present)
        shell: bash
        run: |
           # Skip the apt round-trip when the runner already provides these;
           # otherwise install the exact same set so any runner still works.
           if command -v fd >/dev/null 2>&1 \
              && command -v rg >/dev/null 2>&1 \
              && command -v magick >/dev/null 2>&1 \
              && pkg-config --exists cairo pango 2>/dev/null; then
             echo "System deps already present; skipping apt."
             exit 0
           fi
           sudo apt-get update
           sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
           sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
           sudo ln -sf /usr/bin/convert /usr/local/bin/magick
