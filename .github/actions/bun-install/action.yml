name: "bun install (shared cache)"
description: >
   Ensure bun is on PATH, then run `bun install --frozen-lockfile` with the
   actions/cache-backed package store. bun setup is skipped when the runner
   already ships it and only fetched on runners that lack it.

runs:
   using: composite
   steps:
      - name: Detect bun
        id: env
        shell: bash
        run: |
           # Only fetch bun when the runner doesn't already provide it, so we
           # don't re-download bun from GitHub releases on every job.
           if command -v bun >/dev/null 2>&1; then
             echo "setup_bun=false" >> "$GITHUB_OUTPUT"
             echo "bun present: $(bun --version)"
           else
             echo "setup_bun=true" >> "$GITHUB_OUTPUT"
           fi
      - name: Install bun when absent
        if: steps.env.outputs.setup_bun == 'true'
        shell: bash
        run: |
           export BUN_INSTALL="${HOME}/.bun"
           curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
           echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"

      - name: Cache bun store
        uses: actions/cache@v4
        with:
           path: ~/.bun/install/cache
           key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        shell: bash
        run: |
           # The shared bun store (actions/cache) can hand a job a corrupt or
           # partially written tarball when parallel jobs touch the same cache
           # entry, so `bun install` aborts with `Fail extracting tarball for
           # "<pkg>"`. That blob is content-hash-named, not derivable from the
           # package name, so we can't evict just the bad entry — instead retry
           # the install against a fresh job-local cache dir, forcing a clean
           # re-download without mutating the shared store other concurrent jobs
           # rely on. The warm shared cache stays the fast path; the cold retry
           # only runs on the rare corruption (also covers a transient network
           # blip on attempt 1).
           if bun install --frozen-lockfile; then
             exit 0
           fi
           echo "::warning title=bun install retry::shared bun store install failed; retrying with a clean job-local cache"
           retry_cache="$(mktemp -d "${RUNNER_TEMP:-/tmp}/bun-cache-retry.XXXXXX")"
           bun install --frozen-lockfile --cache-dir="$retry_cache"
