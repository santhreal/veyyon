[book]
title = "The Veyyon Harness Handbook"
description = "Operator handbook for the Veyyon terminal coding agent: install, configuration, tools, approvals, edit formats, providers, and harness structure."
authors = ["Veyyon"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/santhreal/veyyon"
edit-url-template = "https://github.com/santhreal/veyyon/edit/main/docs/handbook/{path}"
additional-css = ["theme/veyyon.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
