# cargo-deny supply-chain policy for the veyyon Rust workspace.
# Run locally with `cargo deny check`; CI runs it in .github/workflows/security.yml.
#
# veyyon is an application workspace (not a published library), so duplicate
# transitive versions are tolerated as a warning rather than a hard failure —
# we cannot always dedupe versions pulled in by third-party and vendored crates.
# Everything that is a genuine security or licensing risk still fails closed.

[graph]
all-features = true

[advisories]
version = 2
# Fail on any crate pinned to a yanked release.
yanked = "deny"
# RUSTSEC advisories we have reviewed and consciously accept live here, each
# with a comment explaining why. Empty = no exceptions; a clean tree fails on
# any unreviewed advisory. Keep this list in sync with .cargo/audit.toml, which
# feeds the parallel cargo-audit job.
ignore = [
    # quick-xml DoS advisories reach veyyon ONLY through wayland-scanner's
    # build-time proc-macro (arboard -> wl-clipboard-rs -> wayland-client ->
    # wayland-scanner), which parses the trusted wayland protocol XML shipped
    # inside the crate at build time — never attacker-controlled runtime input,
    # so the memory-exhaustion / quadratic-parse DoS is unreachable. No upstream
    # fix path: wayland-scanner 0.31.10 pins quick-xml ^0.39 (every 0.39.x is
    # affected; patched only in >=0.41.0) and arboard 3.6.1 is the latest release.
    "RUSTSEC-2026-0194", # quick-xml: quadratic run time on duplicate attribute names
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-declaration allocation
    # Unmaintained (not vulnerable) transitive crates with no maintained drop-in
    # reachable without major dependency surgery on their parents. Revisit when a
    # parent upgrades off them.
    "RUSTSEC-2025-0141", # bincode is unmaintained
    "RUSTSEC-2025-0119", # number_prefix is unmaintained
    "RUSTSEC-2026-0192", # ttf-parser is unmaintained
    "RUSTSEC-2024-0320", # yaml-rust is unmaintained
]

[licenses]
version = 2
# Permissive/public-domain licenses only. A dependency under anything else
# fails the build until it is reviewed and added here (or removed).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
]
# Crates whose license metadata is absent or non-SPDX get a low confidence
# score; 0.8 is cargo-deny's standard threshold for accepting a detected match.
confidence-threshold = 0.8

[[licenses.exceptions]]
# ring vendors BoringSSL bits under a bespoke permissive license bundle.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT", "Apache-2.0"]

[[licenses.exceptions]]
# inferno (flamegraph renderer, pulled in by veyyon-natives) is a Rust port of
# Brendan Gregg's FlameGraph and inherits its CDDL-1.0 license. It is used as an
# unmodified dependency; CDDL-1.0 is a file-level weak copyleft that imposes no
# obligation on veyyon's own MIT/Apache-2.0 source.
name = "inferno"
allow = ["CDDL-1.0"]

[[licenses.exceptions]]
# terminfo (via brush-core, the veyyon-shell command interpreter) is WTFPL,
# which is public-domain-equivalent and imposes no obligations.
name = "terminfo"
allow = ["WTFPL"]

[bans]
# Duplicate transitive versions: warn, don't fail (see header note).
multiple-versions = "warn"
# Wildcard (`*`) version requirements: warn, don't fail. We keep this off "deny"
# only because the vendored uutils (uu_*) and jaq crate families reflect
# upstream's own meta-crate layout, which pins its component crates with `*`;
# those manifests are third-party and read-only, so a hard deny would fail on
# facts we cannot change. Our own workspace crates use pinned versions or path
# deps — a `*` appearing in a veyyon-authored manifest is still a review finding.
wildcards = "warn"
allow-wildcard-paths = true
# Crates we never want in the tree at all go here (name + reason).
deny = []

[sources]
# Only crates.io and in-tree path/patch dependencies are allowed. A dependency
# pulled straight from an arbitrary git remote or a private registry fails the
# build — vendored forks live under crates/vendor/ as path deps instead.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
