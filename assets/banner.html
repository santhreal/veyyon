<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veyyon Logo</title>
  <!-- Brand banner source. Canonical Veyyon identity: pitch-black ground,
       silver structure, the single ember-sun mark (veyyōn = the sun) — no
       purple/cyan, no circuit chrome, no pi glyph. Sibling of the collab og
       card (packages/collab-web/og-image.html). -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000000;
      font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    }
    .logo-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000000;
      overflow: hidden;
    }
    /* faint silver grid, like a plotted surface */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(198,203,212,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(198,203,212,0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      -webkit-mask-image: radial-gradient(120% 100% at 50% 45%, #000 35%, transparent 78%);
              mask-image: radial-gradient(120% 100% at 50% 45%, #000 35%, transparent 78%);
    }
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    /* the ember sun — the mark. Stepped discrete bands, no smooth gradient. */
    .sun {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      margin-bottom: 32px;
      background: radial-gradient(circle,
        #ffca80 0 22%, #fb9e44 22% 44%, #f0862e 44% 66%, #c8590c 66% 100%);
    }
    .title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.34em;
      color: #e6e9ee;
      margin-bottom: 14px;
    }
    .tagline {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #7c828d;
    }
    .tagline .bracket { font-size: 18px; font-weight: 300; color: #f0862e; }
    .tagline .text {
      font-size: 14px; letter-spacing: 0.4em; text-transform: uppercase; color: #b4bac4;
    }
    .status {
      margin-top: 26px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: #7c828d;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7fb98a;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .corner {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: rgba(198,203,212,0.14);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; }
    .corner.tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; }
    .corner.bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner.br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="grid"></div>

    <div class="content">
      <div class="sun"></div>

      <div class="title">VEYYON</div>

      <div class="tagline">
        <span class="bracket">[</span>
        <span class="text">ai coding agent</span>
        <span class="bracket">]</span>
      </div>

      <div class="status">
        <div class="status-dot"></div>
        <span>MCP · LSP · Subagents · Web Search</span>
      </div>
    </div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</body>
</html>
