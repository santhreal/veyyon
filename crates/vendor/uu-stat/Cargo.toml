# Vendored from uutils/coreutils tag 0.8.0 (src/uu/stat), patched to resolve
# path arguments against the shell working directory and route I/O through
# veyyon-uutils-ctx so it can run in-process as a shell builtin. See src/stat.rs
# for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_stat"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "stat ~ (uutils) display FILE status (vendored + patched for in-process embedding)"

[lib]
path = "src/stat.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
thiserror = "2.0.3"
uucore = { version = "0.9.0", features = ["entries", "libc", "fs", "fsext", "time"] }
veyyon-uutils-ctx = { path = "../../veyyon-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
