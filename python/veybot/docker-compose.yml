services:
  # ───────────────────────────────────────────────────────────────────────────
  # veybot orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  veybot:
    build:
      # veyyon root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/veybot/data and veyyon-root excludes are filtered via
      # Dockerfile.veybot.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.veybot
      args:
        # Tag of the pre-built veyyon-base image produced by `bun run docker:build`
        # (sources: veyyon root /Dockerfile). Override per-environment as needed.
        VEYYON_BASE: veyyon:dev
    image: veybot:dev
    container_name: veybot
    # Phase B (graceful shutdown): gives the orchestrator at least
    # VEYBOT_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + VEYBOT_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      # --- gh-proxy channel ---
      # The orchestrator NEVER holds GITHUB_TOKEN; it talks to the sibling
      # gh-proxy container over the internal-only network.
      VEYBOT_GH_PROXY_URL: http://gh-proxy:8081
      VEYBOT_GH_PROXY_HMAC_KEY: ${VEYBOT_GH_PROXY_HMAC_KEY:?VEYBOT_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      VEYBOT_BOT_LOGIN: ${VEYBOT_BOT_LOGIN:?VEYBOT_BOT_LOGIN must be set in .env}
      VEYBOT_GIT_AUTHOR_NAME: ${VEYBOT_GIT_AUTHOR_NAME:-}
      VEYBOT_GIT_AUTHOR_EMAIL: ${VEYBOT_GIT_AUTHOR_EMAIL:?VEYBOT_GIT_AUTHOR_EMAIL must be set in .env}
      VEYBOT_REPO_ALLOWLIST: ${VEYBOT_REPO_ALLOWLIST:?VEYBOT_REPO_ALLOWLIST must be set in .env}
      VEYBOT_MAINTAINER_LOGINS: ${VEYBOT_MAINTAINER_LOGINS:-}
      VEYBOT_REVIEWER_BOTS: ${VEYBOT_REVIEWER_BOTS:-}

      # --- PR review ---
      # Master switch. When true, veybot reviews incoming PRs on
      # opened/reopened/ready_for_review.
      VEYBOT_PR_REVIEW_ENABLED: ${VEYBOT_PR_REVIEW_ENABLED:-true}

      # --- model selection ---
      VEYBOT_MODEL: ${VEYBOT_MODEL:-anthropic/claude-sonnet-4-6}
      VEYBOT_PROVIDER: ${VEYBOT_PROVIDER:-}
      VEYBOT_THINKING: ${VEYBOT_THINKING:-high}

      # --- runtime tuning ---
      VEYBOT_MAX_CONCURRENCY: ${VEYBOT_MAX_CONCURRENCY:-8}
      VEYBOT_TASK_TIMEOUT_SECONDS: ${VEYBOT_TASK_TIMEOUT_SECONDS:-2400}
      VEYBOT_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${VEYBOT_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      VEYBOT_REQUEST_TIMEOUT_SECONDS: ${VEYBOT_REQUEST_TIMEOUT_SECONDS:-120}
      VEYBOT_RATE_LIMIT_WINDOW_SECONDS: ${VEYBOT_RATE_LIMIT_WINDOW_SECONDS:-3600}
      VEYBOT_RATE_LIMIT_DEFAULT: ${VEYBOT_RATE_LIMIT_DEFAULT:-3}
      VEYBOT_RATE_LIMIT_CONTRIBUTOR: ${VEYBOT_RATE_LIMIT_CONTRIBUTOR:-10}
      VEYBOT_RATE_LIMIT_UNLIMITED: ${VEYBOT_RATE_LIMIT_UNLIMITED:-}
      VEYBOT_QUESTION_AUTOCLOSE_ENABLED: ${VEYBOT_QUESTION_AUTOCLOSE_ENABLED:-true}
      VEYBOT_QUESTION_AUTOCLOSE_HOURS: ${VEYBOT_QUESTION_AUTOCLOSE_HOURS:-4}
      VEYBOT_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${VEYBOT_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      VEYBOT_REPLAY_TOKEN: ${VEYBOT_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      VEYBOT_AGENT_COMMAND: veyyon
      VEYBOT_WORKSPACE_ROOT: /data/workspaces
      VEYBOT_SQLITE_PATH: /data/veybot.sqlite
      VEYBOT_LOG_DIR: /data/logs
      VEYBOT_BIND_HOST: ${VEYBOT_BIND_HOST:-0.0.0.0}
      VEYBOT_BIND_PORT: ${VEYBOT_BIND_PORT:-8080}
      VEYYON_ROOT: /work/veyyon
    depends_on:
      gh-proxy:
        condition: service_started
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.veyyon/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - veybot_internal
    volumes:
      - ${VEYYON_ROOT:-../..}:/work/veyyon:ro
      - veybot_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.veyyon and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.veyyon/agent/models.container.yml:/srv/agent-home-stage/.veyyon/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (VEYBOT_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: veybot:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["python", "-m", "veybot.proxy", "serve"]
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      VEYBOT_GH_PROXY_HMAC_KEY: ${VEYBOT_GH_PROXY_HMAC_KEY:?VEYBOT_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      VEYBOT_WORKSPACE_ROOT: /data/workspaces
      VEYBOT_SQLITE_PATH: /data/veybot.sqlite
      VEYBOT_LOG_DIR: /data/logs
      # Bind on the internal network only.
      VEYBOT_GH_PROXY_BIND_HOST: 0.0.0.0
      VEYBOT_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      VEYBOT_BOT_LOGIN: ${VEYBOT_BOT_LOGIN:?VEYBOT_BOT_LOGIN must be set in .env}
      VEYBOT_GIT_AUTHOR_EMAIL: ${VEYBOT_GIT_AUTHOR_EMAIL:?VEYBOT_GIT_AUTHOR_EMAIL must be set in .env}
      VEYBOT_REPO_ALLOWLIST: ${VEYBOT_REPO_ALLOWLIST:?VEYBOT_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `veybot_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - veybot_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - veybot_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  veybot_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  veybot_data: {}
