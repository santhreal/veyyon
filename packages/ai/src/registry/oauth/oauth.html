<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#000000" />
		<title>Veyyon · authentication</title>
		<style>
			:root {
				--bg: #000000;
				--fg: #f6f7f9;
				--fg-2: #b4bac4;
				--muted: #7c828d;
				--sun: #f0862e;
				--sun-hi: #fb9e44;
				--green: #7fb98a;
				--red: #c96f6e;
				--line: rgba(198, 203, 212, 0.14);
				--mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
			}
			* { box-sizing: border-box; }
			html, body { height: 100%; }
			body {
				margin: 0;
				background: var(--bg);
				color: var(--fg);
				font-family: var(--mono);
				overflow: hidden;
				display: grid;
				place-items: center;
			}
			#sun {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				z-index: 0;
			}
			.card {
				position: relative;
				z-index: 1;
				text-align: center;
				padding: 40px 28px;
				max-width: 30rem;
				opacity: 0;
				transform: translateY(8px);
				animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
			}
			@keyframes rise { to { opacity: 1; transform: none; } }
			.status {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				font-size: 12px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin-bottom: 22px;
			}
			.status .glyph { font-size: 15px; line-height: 1; }
			.status .word { color: var(--muted); }
			.status .tag {
				border: 1px solid var(--line);
				border-radius: 999px;
				padding: 2px 10px;
				font-size: 11px;
				letter-spacing: 0.1em;
			}
			h1 {
				margin: 0 0 12px;
				font-size: clamp(30px, 7vw, 46px);
				font-weight: 700;
				letter-spacing: -0.01em;
			}
			p {
				margin: 0 auto;
				max-width: 26ch;
				color: var(--fg-2);
				font-size: 14px;
				line-height: 1.6;
			}
			.brand {
				margin-top: 30px;
				font-size: 12px;
				letter-spacing: 0.18em;
				text-transform: lowercase;
				color: var(--muted);
			}
			.btn {
				margin-top: 26px;
				display: inline-flex;
				align-items: center;
				gap: 8px;
				border: 1px solid rgba(240, 134, 46, 0.45);
				color: var(--fg);
				background: transparent;
				font-family: var(--mono);
				font-size: 13px;
				padding: 9px 18px;
				border-radius: 4px;
				cursor: pointer;
				transition: border-color 0.18s, background 0.18s, color 0.18s;
			}
			.btn:hover { border-color: var(--sun-hi); background: rgba(240, 134, 46, 0.12); }
			/* success */
			.success .status .glyph { color: var(--green); }
			.success .status .tag { color: var(--green); border-color: rgba(127, 185, 138, 0.4); }
			.success h1 { color: var(--fg); }
			.success .icon-error { display: none; }
			/* error */
			.error .status .glyph { color: var(--red); }
			.error .status .tag { color: var(--red); border-color: rgba(226, 104, 106, 0.4); }
			.error h1 { color: var(--fg); }
			.error .icon-success { display: none; }
		</style>
	</head>
	<body>
		<canvas id="sun" aria-hidden="true"></canvas>
		<div id="app" class="card">
			<div class="status">
				<span class="glyph icon-success" aria-hidden="true">&#9670;</span>
				<span class="glyph icon-error" aria-hidden="true">&#9670;</span>
				<span class="word" id="statusword">connecting</span>
				<span class="tag" id="statustag">ok</span>
			</div>
			<h1 id="title">Authentication</h1>
			<p id="message"></p>
			<button onclick="window.close()" class="btn">Close window</button>
			<div class="brand">veyyon</div>
		</div>

		<script id="server-state" type="application/json">
			__OAUTH_STATE__
		</script>
		<script>
			// veyyōn — Tamil for the sun. A cell-native ember disc, matching the site.
			(function () {
				var cv = document.getElementById("sun");
				if (!cv) return;
				var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
				var ctx = cv.getContext("2d", { alpha: true });
				var COLORS = ["#4a2714", "#6e3418", "#96431b", "#c25a24", "#f0862e", "#fb9e44", "#fbc06d", "#ffe3ad"];
				var GLYPH = ["·", "·", ":", "░", "▒", "▒", "▓", "█"];
				var W, H, dpr, cellW, cellH, cols, rows, fontPx, mono, cxPx, cyPx, Rpx;
				var ripples = [];
				var t0 = performance.now();
				var ok = true;
				function clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }
				function smooth(a, b, x) { var t = clamp01((x - a) / (b - a)); return t * t * (3 - 2 * t); }
				function hash(x, y, s) {
					var h = (x * 374761393 + y * 668265263 + s * 1274126177) >>> 0;
					h = ((h ^ (h >>> 13)) * 1274126177) >>> 0;
					return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
				}
				function layout() {
					W = window.innerWidth; H = window.innerHeight;
					var mn = Math.min(W, H);
					dpr = Math.min(window.devicePixelRatio || 1, 2);
					cv.width = Math.floor(W * dpr); cv.height = Math.floor(H * dpr);
					cv.style.width = W + "px"; cv.style.height = H + "px";
					ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
					fontPx = W < 720 ? 10 : 11;
					mono = (getComputedStyle(document.body).getPropertyValue("--mono") || "monospace").trim();
					cellW = Math.max(5, Math.round(fontPx * 0.62));
					cellH = Math.max(9, Math.round(fontPx * 1.15));
					cols = Math.ceil(W / cellW); rows = Math.ceil(H / cellH);
					cxPx = W / 2; cyPx = H * 0.4; Rpx = mn * (W < 720 ? 0.32 : 0.24);
				}
				function spawn(px, py, amp) {
					ripples.push({ x: px, y: py, t: (performance.now() - t0) / 1000, amp: amp });
					if (ripples.length > 16) ripples.shift();
				}
				window.addEventListener("click", function (e) {
					var r = cv.getBoundingClientRect();
					spawn(e.clientX - r.left, e.clientY - r.top, 1.0);
				});
				function draw(time) {
					// error state cools the disc to low embers; success burns bright
					var gain = ok ? 1 : 0.55;
					Rpx = Rpx; // stable radius
					var breathe = 1 + Math.sin(time * 0.6) * 0.02;
					var R = Rpx * breathe, pad = R * 0.3;
					ctx.clearRect(0, 0, W, H);
					ctx.font = fontPx + "px " + mono;
					ctx.textAlign = "center"; ctx.textBaseline = "middle";
					var gx0 = Math.max(0, Math.floor((cxPx - R - pad) / cellW));
					var gx1 = Math.min(cols, Math.ceil((cxPx + R + pad) / cellW));
					var gy0 = Math.max(0, Math.floor((cyPx - R - pad) / cellH));
					var gy1 = Math.min(rows, Math.ceil((cyPx + R + pad) / cellH));
					var step = Math.floor(time * 5);
					for (var gy = gy0; gy < gy1; gy++) {
						var py = gy * cellH + cellH / 2;
						for (var gx = gx0; gx < gx1; gx++) {
							var px = gx * cellW + cellW / 2;
							var d = Math.hypot(px - cxPx, py - cyPx) / R;
							var base = (1 - smooth(0.72, 1.02, d)) * gain;
							var corona = d > 1.0 && d < 1.26 ? smooth(1.26, 1.0, d) * 0.45 * gain : 0;
							var rp = 0;
							for (var i = 0; i < ripples.length; i++) {
								var rs = ripples[i], age = time - rs.t;
								if (age < 0 || age > 3.2) continue;
								var rd = Math.hypot(px - rs.x, py - rs.y);
								rp += Math.sin(rd * 0.05 - age * 7) * Math.exp(-age * 1.7) * Math.exp(-rd * 0.006) * rs.amp;
							}
							var churn = (Math.sin(gx * 0.34 + time * 0.9) * Math.sin(gy * 0.42 - time * 0.75) +
								Math.sin(gx * 0.13 - gy * 0.17 + time * 0.5)) * 0.045;
							var val = base * 0.9 + rp * 0.55 + churn * base;
							if (base > 0.02) val += (hash(gx, gy, step) - 0.5) * 0.2 * Math.min(1, base + 0.25);
							else if (corona > 0 && hash(gx, gy, step + 5) < corona * 0.5) val = corona * (0.5 + hash(gx, gy, 9) * 0.5);
							if (base > 0.8) val += Math.sin(time * 1.3) * 0.04;
							if (val <= 0.12) continue;
							if (val > 1) val = 1;
							var bi = Math.min(7, Math.floor(val * 8));
							ctx.fillStyle = COLORS[bi];
							ctx.fillText(GLYPH[bi], px, py);
						}
					}
				}
				var last = 0;
				function loop(now) {
					if (now - last > 30) { last = now; draw((now - t0) / 1000); }
					requestAnimationFrame(loop);
				}
				window.startSun = function (isOk) {
					ok = isOk;
					if (reduce) { cv.style.display = "none"; return; }
					layout();
					spawn(cxPx, cyPx, isOk ? 1.0 : 0.4);
					requestAnimationFrame(loop);
				};
				var rz;
				window.addEventListener("resize", function () { clearTimeout(rz); rz = setTimeout(layout, 120); });
			})();

			(function () {
				var serverState;
				try {
					serverState = JSON.parse(document.getElementById("server-state").textContent);
				} catch (e) {
					var params = new URLSearchParams(window.location.search);
					serverState = { ok: params.get("ok") === "1", error: params.get("error") || "Authentication failed" };
				}
				var app = document.getElementById("app");
				var title = document.getElementById("title");
				var message = document.getElementById("message");
				var statusword = document.getElementById("statusword");
				var statustag = document.getElementById("statustag");
				if (serverState.ok) {
					app.classList.add("success");
					statusword.textContent = "authenticated";
					statustag.textContent = "ok";
					title.textContent = "Signed in";
					message.textContent =
						"You're signed in to Veyyon. This tab closes on its own — or close it now and return to your terminal.";
					setTimeout(function () { window.close(); }, 3200);
				} else {
					app.classList.add("error");
					statusword.textContent = "sign-in failed";
					statustag.textContent = "err";
					title.textContent = "Sign-in failed";
					message.textContent = serverState.error || "An error occurred. Return to your terminal and try again.";
				}
				if (window.startSun) window.startSun(!!serverState.ok);
			})();
		</script>
	</body>
</html>
